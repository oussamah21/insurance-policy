version: "3.9"

services:

  # ── Spring Boot Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    container_name: insurance-backend
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 0"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - insurance-net

  # ── React Frontend (Nginx) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: insurance-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - insurance-net

networks:
  insurance-net:
    driver: bridge
